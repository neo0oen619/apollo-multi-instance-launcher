# Apollo NVENC Video Encoding Configuration Template
# Use this configuration to enable hardware-accelerated NVIDIA NVENC encoding
# for optimal streaming performance over LAN to Moonlight clients

[encoder]
# Hardware encoder type: nvenc (NVIDIA GPU)
type=nvenc

# Video codec: h265 (HEVC) recommended for quality/bandwidth tradeoff
# Alternative: h264 (if client doesn't support HEVC)
codec=h265

# Bitrate in kbps (50000 = 50 Mbps)
# Adjust based on LAN speed and desired quality
# Recommended: 50-100 Mbps for 1080p60, 100-200 Mbps for 4K30
bitrate=50000

# Frame rate: 60 (recommended) or 30
framerate=60

# Preset: default, fast, slow (GPU encoding - minimal CPU overhead)
preset=default

# Profile: main (H.264) or main10 (H.265)
profile=main

[display]
# Resolution: leave blank for native or specify WIDTHxHEIGHT
# Examples: 1920x1080, 3840x2160, 2560x1440
resolution=

# Refresh rate: 60 or 120 (must match monitor capability)
refresh_rate=60

[network]
# Target bitrate adaptation: adaptive, constant, variable
adaptation=adaptive

# Enable frame pacing for smooth delivery
frame_pacing=true

# Network jitter tolerance (ms)
jitter_tolerance=50

[quality]
# Quality preset: performance, balanced, quality
# performance: 25-35 Mbps, smooth at cost of visual quality
# balanced: 50-75 Mbps, best tradeoff
# quality: 100+ Mbps, maximum visual fidelity
quality_preset=balanced

# Enable B-frames (improved compression, slight latency)
enable_bframes=true

# Lookahead depth: 0-16 (higher = better compression, more latency)
lookahead=8

[audio]
# Audio codec: aac, opus (opus preferred for low latency)
audio_codec=opus

# Audio bitrate: 128 (good balance)
audio_bitrate=128

[client]
# Moonlight client hostname or IP
# This is configured per-instance in apollo_multi_launcher.py
client_ip=
client_port=47989

# Enable pairing authentication
require_pairing=true

# Enable HDR support (if client supports it)
hdr_enabled=false
